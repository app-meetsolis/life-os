name: Life OS Weekly Report

on:
  schedule:
    # Sunday 9:00 PM IST = Sunday 3:30 PM UTC
    - cron: "30 15 * * 0"
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run weekly report
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NOTION_DAILY_LOG_DB_ID: 31fdc800-c36f-81c6-89b1-d680cd9bb889
          NOTION_NOTES_DB_ID: 2d2dc800-c36f-81fd-ac66-f4103682e4ed
        run: node tools/weekly-report.js
