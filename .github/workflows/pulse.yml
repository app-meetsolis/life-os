name: Life OS Pulse News

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Pulse news
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NOTION_NOTES_DB_ID: 2d2dc800-c36f-81fd-ac66-f4103682e4ed
        run: node tools/pulse.js
